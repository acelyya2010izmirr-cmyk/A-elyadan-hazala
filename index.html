<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parlayan Çiçek</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="scene">
    
    <div class="glow-bg"></div>

    <div class="particles">
      <div class="particle p1"></div>
      <div class="particle p2"></div>
      <div class="particle p3"></div>
      <div class="particle p4"></div>
      <div class="particle p5"></div>
    </div>

    <div class="flower-group">
      
      <div class="branch branch-left">
        <div class="stem"></div>
        <div class="leaves">
          <div class="leaf l1"></div>
          <div class="leaf l2"></div>
        </div>
        <div class="flower-head">
          <div class="petal pt1"></div>
          <div class="petal pt2"></div>
          <div class="petal pt3"></div>
          <div class="flower-center"></div>
        </div>
      </div>

      <div class="branch branch-right">
        <div class="stem"></div>
        <div class="leaves">
          <div class="leaf l1"></div>
          <div class="leaf l2"></div>
        </div>
        <div class="flower-head">
          <div class="petal pt1"></div>
          <div class="petal pt2"></div>
          <div class="petal pt3"></div>
          <div class="flower-center"></div>
        </div>
      </div>

      <div class="branch branch-center">
        <div class="stem"></div>
        <div class="leaves">
          <div class="leaf l1"></div>
          <div class="leaf l2"></div>
          <div class="leaf l3"></div>
        </div>
        <div class="flower-head">
          <div class="petal pt1"></div>
          <div class="petal pt2"></div>
          <div class="petal pt3"></div>
          <div class="flower-center"></div>
        </div>
      </div>

      <div class="base-leaves">
        <div class="b-leaf bl1"></div>
        <div class="b-leaf bl2"></div>
        <div class="b-leaf bl3"></div>
        <div class="b-leaf bl4"></div>
        <div class="b-leaf bl5"></div>
        <div class="b-leaf bl6"></div>
      </div>

    </div>

    <div class="grass-container">
      <div class="grass g1"></div>
      <div class="grass g2"></div>
      <div class="grass g3"></div>
      <div class="grass g4"></div>
      <div class="grass g5"></div>
      <div class="grass g6"></div>
    </div>

    <div class="signature">
      <div class="planet">🪐</div>
      <p>Açelya</p>
    </div>
  </div>
</body>
</html>
